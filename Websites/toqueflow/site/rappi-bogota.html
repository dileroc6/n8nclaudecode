<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Impresión Rappi · Bogotá — ToqueFlow</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#0a2230; --mute:#5b6b75; --line:#e2e6e9; --orange:#f15a24; --bg:#f6f7f8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Sora",system-ui,sans-serif; color:var(--ink); background:var(--bg); }

  /* ── Cabecera de la herramienta ── */
  .tool-top { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 22px; background:#fff; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .tool-top .brand { display:flex; align-items:center; gap:12px; }
  .tool-top .brand .brand-ferre { height:32px; border-radius:6px; }
  .tool-top .brand .brand-tf { height:34px; }
  .tool-top .brand .brand-x { color:#c9ced2; font-size:18px; line-height:1; }
  .tool-top .brand .brand-title { padding-left:10px; border-left:1px solid var(--line); }
  .tool-top .brand b { font-size:15px; }
  .tool-top .brand span { font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--mute); }
  .panel-logo { display:block; margin:0 auto 16px; max-width:190px; height:auto; }
  .tool-top .who { font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--mute); }
  .tool-top a.back { color:var(--orange); text-decoration:none; font-size:13px; }

  .wrap { max-width:600px; margin:0 auto; padding:30px 22px 80px; display:flex; flex-direction:column; align-items:stretch; gap:22px; }

  .panel { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; }
  .panel h1 { font-size:20px; margin:0 0 4px; }
  .panel p.sub { color:var(--mute); font-size:13.5px; margin:0 0 16px; }
  textarea { width:100%; min-height:220px; border:1px solid var(--line); border-radius:12px; padding:14px; font-family:"JetBrains Mono",monospace; font-size:13px; resize:vertical; outline:none; }
  textarea:focus { border-color:var(--orange); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:10px; padding:12px 18px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-primary { background:var(--orange); color:#fff; }
  .btn-primary:disabled { opacity:.6; cursor:default; }
  .btn-ghost { background:transparent; border:1px solid var(--line); color:var(--ink); }
  .row { display:flex; gap:10px; align-items:center; margin-top:14px; flex-wrap:wrap; }
  .notice { border-radius:10px; padding:11px 13px; font-size:13px; margin-top:12px; }
  .notice.error { background:#fdecea; color:#c0392b; }
  .muted { color:var(--mute); font-size:12px; font-family:"JetBrains Mono",monospace; }

  /* ── Recibo 80mm (diseño aprobado) ── */
  .receipt-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; }
  .receipt { font-family:'Courier New',Courier,monospace; font-size:11px; color:#000; background:#fff; width:76mm; max-width:100%; margin:0 auto; padding:4mm 2mm; }
  .receipt .logo-row img { max-width:70%; height:auto; display:block; margin:0 auto 6px; }
  .receipt .company-name { font-size:17px; font-weight:bold; text-align:center; margin-bottom:4px; letter-spacing:.5px; }
  .receipt .company-info { font-size:10px; text-align:center; line-height:1.6; }
  .receipt .sep-solid { border-top:1.5px solid #000; margin:6px 0; }
  .receipt .sep-dot { border-top:1px dashed #000; margin:4px 0; }
  .receipt .order-label { font-size:10px; font-weight:bold; text-transform:uppercase; margin-bottom:2px; }
  .receipt .order-main-row { display:flex; justify-content:space-between; align-items:center; }
  .receipt .order-ref-row { display:flex; align-items:center; gap:4px; }
  .receipt .order-ref-box { font-size:18px; font-weight:bold; border:2.5px solid #000; padding:1px 10px; letter-spacing:2px; }
  .receipt .client-section { font-size:11px; margin:2px 0; }
  .receipt .item-row { display:flex; justify-content:space-between; align-items:flex-start; padding:3px 0; gap:4px; }
  .receipt .item-name { flex:1; font-size:11px; line-height:1.4; }
  .receipt .item-qty { font-weight:bold; }
  .receipt .item-price { font-size:11px; font-weight:bold; white-space:nowrap; text-align:right; min-width:48px; }
  .receipt .total-row { display:flex; justify-content:space-between; padding:3px 0; font-size:11px; }
  .receipt .grand-total-section { text-align:right; margin:4px 0 2px; }
  .receipt .grand-total-label { font-size:12px; font-weight:bold; text-transform:uppercase; }
  .receipt .grand-total-amount { font-size:28px; font-weight:bold; line-height:1.1; margin:2px 0; }
  .receipt .footer { text-align:center; font-size:10px; line-height:1.6; margin-top:4px; }

  @page { size:80mm auto; margin:2mm; }
  @media print {
    body { background:#fff; }
    .no-print { display:none !important; }
    .wrap { display:block; padding:0; margin:0; max-width:none; }
    .receipt-card { border:none; border-radius:0; padding:0; }
    .receipt { width:100%; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

</html>
